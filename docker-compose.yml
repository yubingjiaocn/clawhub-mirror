services:
  app:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - skill_storage:/app/skill_storage
      - db_data:/app/data
    environment:
      - CLAWHUB_DATABASE_URL=sqlite+aiosqlite:///./data/clawhub_mirror.db
      - CLAWHUB_STORAGE_LOCAL_PATH=/app/skill_storage
    depends_on:
      minio:
        condition: service_healthy
        required: false

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    profiles:
      - s3

volumes:
  skill_storage:
  db_data:
  minio_data:
